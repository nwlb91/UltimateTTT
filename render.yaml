# Render Blueprint. In the Render dashboard: New + -> "Blueprint", point it at
# this repo, and it will read this file. No terminal required.
services:
  - type: web
    name: ultimate-ttt
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips '*'
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Keep ONNX single-threaded; the free tier has ~0.5 CPU and this avoids
      # thread thrash. Raise it on a bigger plan for faster AI moves.
      - key: UTTT_ORT_THREADS
        value: "1"
